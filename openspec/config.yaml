schema: conduction

context: |
  Project: LarpingApp
  Repo: ConductionNL/LarpingNextApp
  Type: Nextcloud App (PHP backend + Vue 2 frontend)
  Description: LARP (live-action role-playing) management app for Nextcloud — manages characters, skills, items, conditions, effects, events, players, abilities, and templates
  Key components: Character stat calculation engine, PDF character sheet export (mPDF + Twig), generic ObjectService with dual data-source support
  Database: PostgreSQL/MySQL/SQLite (via Nextcloud Entity/Mapper) or OpenRegister (JSON object storage)
  Mount path: /var/www/html/custom_apps/larpingapp

  Architecture:
    Pattern: Generic ObjectService — single service dispatches CRUD to internal mappers or OpenRegister based on per-type configuration
    Data layer: Dual-mode — native Nextcloud DB (10 Entity/Mapper pairs) OR OpenRegister (JSON objects with schema validation)
    Frontend: Vue 2.7 + Pinia stores + TypeScript entity classes with Zod validation
    Backend: ObjectsController (generic CRUD), CharactersController (PDF export), SettingsController (data source config), CharacterService (stat calculation + PDF generation)
    Entity types: ability, character, condition, effect, event, item, player, setting, skill, template
    Stat engine: CharacterService.calculateCharacter() aggregates effects from skills, items, conditions, and events onto ability scores with full audit trail
    PDF: mPDF with Twig templates, character data rendered to HTML then converted to PDF

  Shared specs: See ../openspec/specs/ for cross-project conventions
  Project guidelines: See ../project.md for workspace-wide standards
  JSON Schemas: See docs/Schema/ for CommonGateway Entity schema definitions per entity type

rules:
  proposal:
    - Reference shared nextcloud-app spec for app structure requirements
    - Consider impact on stat calculation engine when modifying effects, skills, items, or conditions
    - Specify whether feature affects internal mappers, OpenRegister, or both data paths
    - Reference docs/Schema/*.json for entity definitions and constraints
  specs:
    - Use CommonGateway Entity schema conventions for data model references
    - Include effect chain documentation for any feature that modifies character stats
    - Specify both internal (Entity/Mapper) and OpenRegister behavior where applicable
    - Reference TypeScript entity types (src/entities/*/types.ts) for frontend contracts
    - Include GIVEN/WHEN/THEN scenarios for all CRUD operations and stat calculations
  design:
    - Generic ObjectService pattern — new entity types MUST be added to the objectType match in getMapper()
    - Frontend stores follow Pinia pattern with entity class hydration
    - Modals and views follow per-entity-type directory structure (src/modals/{type}/, src/views/{type}/)
    - All API calls go through /api/objects/{objectType} generic endpoints except PDF download and settings
    - Character saves MUST trigger stat recalculation via CharacterService.calculateCharacter()
  tasks:
    - Test with both internal mappers AND OpenRegister data sources
    - Verify stat calculation produces correct audit trails
    - Ensure TypeScript entity classes match JSON schema definitions
    - Test PDF generation with Twig templates when character features change
    - Follow mandatory task categories from ADRs 005, 009, 010, 011
